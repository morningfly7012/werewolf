<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>法官模式 · 狼人殺輔助器</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="title-row">
      <span class="logo">🧑‍⚖️</span>
      <h1>法官模式</h1>
      <button class="ghost sm" id="voiceToggle" style="margin-left:auto;width:auto">🔊 語音</button>
    </div>

    <div class="banner" id="phaseBanner">準備中…</div>
    <div class="step-indicator" id="stepDots"></div>

    <!-- 主面板，依階段切換 -->
    <div id="panel"></div>

    <div class="card">
      <h3>場上狀態</h3>
      <div class="seat-grid" id="boardSeats"></div>
      <details style="margin-top:10px">
        <summary class="muted small">查看角色分配（法官專用）</summary>
        <div id="roleMap" class="small" style="margin-top:8px"></div>
      </details>
      <details style="margin-top:8px">
        <summary class="muted small">事件記錄</summary>
        <div class="log" id="historyLog"></div>
      </details>
    </div>
    <button class="ghost" onclick="location.href='index.html'">← 回首頁重新設定</button>
  </div>

  <script type="module">
    import { Game } from './shared/engine.js';
    import { ROLES, isWolf } from './shared/roles.js';
    import { speak, setVoiceEnabled, isVoiceEnabled, warmup } from './js/voice.js';
    import { toast, el, renderSeats, REASON_TEXT } from './js/ui.js';

    const config = JSON.parse(sessionStorage.getItem('ww_config') || 'null');
    const options = JSON.parse(sessionStorage.getItem('ww_options') || '{}');
    if (!config) { location.href = 'index.html'; }

    const game = new Game(config, options);
    const N = game.totalSeats;
    for (let i = 1; i <= N; i++) game.addPlayer(`${i}號`);
    // 角色延後指定：系統發牌模式按下後才發；實體牌模式於第一晚登記。

    const panel = document.getElementById('panel');
    const phaseBanner = document.getElementById('phaseBanner');
    const stepDots = document.getElementById('stepDots');

    // 語音開關
    const vbtn = document.getElementById('voiceToggle');
    function refreshVoiceBtn() { vbtn.textContent = isVoiceEnabled() ? '🔊 語音開' : '🔇 語音關'; }
    vbtn.onclick = () => { setVoiceEnabled(!isVoiceEnabled()); refreshVoiceBtn(); if (isVoiceEnabled()) warmup(); };
    refreshVoiceBtn();

    // ── 場上狀態渲染 ──
    function renderBoard() {
      renderSeats(document.getElementById('boardSeats'), game.players, {});
      const rm = document.getElementById('roleMap');
      rm.innerHTML = game.players.map((p) => {
        const r = ROLES[p.roleId];
        const label = r ? `${r.emoji}${r.name}` : '（未登記）';
        return `<span class="pill" style="margin:2px">${p.seat}號 ${label}${p.alive ? '' : ' ✕'}</span>`;
      }).join(' ');
      const hl = document.getElementById('historyLog');
      hl.innerHTML = game.history.map(formatHistory).join('');
    }
    function formatHistory(h) {
      if (h.type === 'night') {
        const d = h.deaths.length ? h.deaths.map((x) => `${x.seat}號(${REASON_TEXT[x.reason]})`).join('、') : '平安夜';
        return `<div>第${h.day}夜：${d}</div>`;
      }
      if (h.type === 'vote') return `<div>第${h.day}天投票：${h.target ? h.target + '號出局' + (h.idiot ? '(白痴翻牌)' : '') : '無人出局'}</div>`;
      if (h.type === 'gun') return `<div>第${h.day}天：${h.shooter}號開槍帶走 ${h.target}號</div>`;
      return '';
    }

    function setDots(steps, active) {
      stepDots.innerHTML = '';
      steps.forEach((s, i) => {
        const d = el('div', { class: 'step-dot' + (i < active ? ' done' : i === active ? ' active' : '') });
        stepDots.appendChild(d);
      });
    }

    // ── 選人元件 ──
    function seatPicker(opts) {
      // opts: { allowNull, nullLabel, filter, highlightRoles, onPick }
      const grid = el('div', { class: 'seat-grid' });
      let selected = null;
      const targets = game.alivePlayers().filter((p) => (opts.filter ? opts.filter(p) : true));
      function paint() {
        grid.innerHTML = '';
        for (const p of targets) {
          const isHi = opts.highlightRoles && opts.highlightRoles.includes(p.roleId);
          const div = el('div', { class: 'seat' + (selected === p.seat ? ' sel' : '') });
          div.appendChild(el('div', { class: 'num', text: String(p.seat) }));
          div.appendChild(el('div', { class: 'nm', text: isHi ? ROLES[p.roleId].name : '' }));
          div.style.cursor = 'pointer';
          div.onclick = () => { selected = p.seat; paint(); opts.onPick && opts.onPick(selected); };
          grid.appendChild(div);
        }
      }
      paint();
      const box = el('div', {}, [grid]);
      if (opts.allowNull) {
        const nb = el('button', { class: 'ghost sm', style: 'width:auto;margin-top:8px', text: opts.nullLabel || '不選擇 / 空過', onclick: () => { selected = null; paint(); opts.onPick && opts.onPick(null); } });
        box.appendChild(nb);
      }
      box.getSelected = () => selected;
      return box;
    }

    function btn(text, cls, onclick) {
      return el('button', { class: cls || '', text, onclick });
    }

    // ════════════ 遊戲流程 ════════════
    let nightSteps = [], nightIdx = 0, pickerRef = null;

    function startGame() {
      phaseBanner.className = 'banner';
      phaseBanner.textContent = '選擇發牌方式（號碼已編 1～' + N + '）';
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('h2', { text: '🎴 發牌方式' }));
      c.appendChild(el('p', { class: 'muted', text: '選擇要由系統發牌，還是使用實體角色牌。' }));
      c.appendChild(btn('📱 系統發牌＋傳手機看角色', '', () => { game.dealRoles(); renderPass(1); }));
      c.appendChild(btn('🃏 系統發牌＋直接開始（法官看角色表）', 'secondary', () => { game.dealRoles(); renderBoard(); beginNight(); }));
      c.appendChild(btn('✋ 用實體牌＋第一晚登記角色', 'secondary', beginRegistration));
      c.appendChild(el('p', { class: 'muted small', text: '實體牌模式：玩家自己拿實體角色牌，第一晚各角色起身時，由法官登記是誰；沒被登記到的就是平民。' }));
      panel.appendChild(c);
      renderBoard();
    }

    // ── 實體牌：第一晚登記角色 ──────────────────
    let regSteps = [], regIdx = 0, assignedSeats = new Set();
    function beginRegistration() {
      assignedSeats = new Set();
      // 依序登記設定檔中存在的特殊角色（平民最後自動補上）
      const orderIds = ['cupid', 'guard', 'werewolf', 'wolfking', 'whitewolfking', 'hiddenwolf', 'witch', 'seer', 'hunter', 'idiot', 'elder', 'knight'];
      regSteps = orderIds.filter((id) => (config[id] || 0) > 0).map((id) => ({ id, count: config[id] }));
      regIdx = 0;
      phaseBanner.className = 'banner night';
      phaseBanner.textContent = '🌙 第一晚 · 登記角色';
      speak('天黑請閉眼。第一晚，請依序登記各角色。');
      renderRegStep();
    }

    function renderRegStep() {
      renderBoard();
      if (regIdx >= regSteps.length) {
        // 其餘座位設為平民，進入第一晚行動
        game.assignRemainingAsVillager();
        renderBoard();
        panel.innerHTML = '';
        const c = el('div', { class: 'card' });
        c.appendChild(el('div', { class: 'banner good-win', text: '✅ 角色登記完成，其餘座位皆為平民。' }));
        c.appendChild(el('p', { class: 'muted', text: '接著進行第一晚的實際行動（守衛、狼人、女巫、預言家等）。' }));
        c.appendChild(btn('開始第一晚行動 →', '', beginNight));
        panel.appendChild(c);
        return;
      }
      const step = regSteps[regIdx];
      const r = ROLES[step.id];
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('h2', { text: `登記：${r.emoji} ${r.name} × ${step.count}` }));
      const isNightRole = ['cupid', 'guard', 'werewolf', 'wolfking', 'whitewolfking', 'witch', 'seer'].includes(step.id);
      c.appendChild(el('p', { class: 'muted', text: isNightRole ? `「${r.name}請睜眼」，請點選 ${step.count} 位 ${r.name} 的座位。` : `${r.name} 夜晚不起身，請直接點選 ${step.count} 位座位登記。` }));
      if (isNightRole) speak(`${r.name}請睜眼。`);
      // 多選座位（尚未被登記者）
      const picker = multiSeatPicker(step.count, (seat) => !assignedSeats.has(seat));
      c.appendChild(picker);
      c.appendChild(btn(`確認登記 ${r.name} →`, '', () => {
        const sel = picker.get();
        if (sel.length !== step.count) return toast(`請選擇 ${step.count} 位。`, true);
        for (const s of sel) { game.registerRole(s, step.id); assignedSeats.add(s); }
        if (isNightRole) speak(`${r.name}請閉眼。`);
        regIdx++;
        renderRegStep();
      }));
      panel.appendChild(c);
    }

    // 多選座位元件（需選滿 count 個）
    function multiSeatPicker(count, allow) {
      const grid = el('div', { class: 'seat-grid' });
      const sel = new Set();
      function paint() {
        grid.innerHTML = '';
        for (const p of game.players) {
          if (!allow(p.seat)) continue;
          const d = el('div', { class: 'seat' + (sel.has(p.seat) ? ' sel' : '') });
          d.appendChild(el('div', { class: 'num', text: String(p.seat) }));
          d.style.cursor = 'pointer';
          d.onclick = () => {
            if (sel.has(p.seat)) sel.delete(p.seat);
            else { if (sel.size >= count) { toast(`最多選 ${count} 位`, true); return; } sel.add(p.seat); }
            paint();
          };
          grid.appendChild(d);
        }
      }
      paint();
      const box = el('div', {}, [grid]);
      box.get = () => [...sel];
      return box;
    }

    // 取得狼隊隊友（會睜眼刀人的狼，不含隱狼）供互相辨識
    function killerWolves() {
      return game.players.filter((p) => ROLES[p.roleId] && ROLES[p.roleId].nightKill);
    }

    // 傳手機：交接畫面，請第 seat 號接手
    function renderPass(seat) {
      phaseBanner.className = 'banner';
      phaseBanner.textContent = `📱 傳手機看角色（${seat} / ${N}）`;
      speak(`請把手機交給 ${seat} 號玩家。`);
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('div', { class: 'banner day', html: `請把手機交給 <b style="font-size:34px">${seat}</b> 號玩家` }));
      c.appendChild(el('p', { class: 'muted', text: '確認只有本人在看，再點下方查看角色。' }));
      c.appendChild(btn(`我是 ${seat} 號，查看我的角色`, '', () => renderReveal(seat)));
      panel.appendChild(c);
    }

    // 傳手機：顯示第 seat 號的角色
    function renderReveal(seat) {
      const p = game.getPlayer(seat);
      const r = ROLES[p.roleId];
      panel.innerHTML = '';
      const c = el('div', {});
      const rc = el('div', { class: 'role-card ' + r.camp });
      rc.appendChild(el('div', { class: 'role-emoji', text: r.emoji }));
      rc.appendChild(el('div', { class: 'role-name', text: `${seat}號 · ${r.name}` }));
      rc.appendChild(el('div', { class: 'muted', text: r.desc }));
      c.appendChild(rc);
      // 狼隊友資訊
      if (isWolf(p.roleId)) {
        const mates = killerWolves().filter((x) => x.seat !== seat).map((x) => `${x.seat}號`);
        let txt;
        if (p.roleId === 'hiddenwolf') txt = '🌑 你是隱狼。狼隊友：' + (mates.length ? mates.join('、') : '（無）') + '。你夜晚不睜眼刀人，預言家驗你為好人。';
        else txt = '🐺 你的狼隊友：' + (mates.length ? mates.join('、') : '（只有你一隻會刀人的狼）');
        c.appendChild(el('div', { class: 'banner', style: 'margin-top:12px', html: txt }));
      }
      const last = seat >= N;
      c.appendChild(btn(last ? '蓋牌（最後一位）' : '蓋牌，傳給下一位 →', '', () => {
        if (last) renderAllRevealed();
        else renderPass(seat + 1);
      }));
      panel.appendChild(c);
    }

    function renderAllRevealed() {
      phaseBanner.className = 'banner';
      phaseBanner.textContent = '所有玩家都看過角色了';
      speak('所有玩家都看完角色，準備天黑。');
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('div', { class: 'banner good-win', text: '✅ 全員已確認角色' }));
      c.appendChild(btn('🌙 開始第一夜', '', beginNight));
      panel.appendChild(c);
    }

    function beginNight() {
      const day = game.startNight();
      nightSteps = game.nightSteps();
      nightIdx = 0;
      phaseBanner.className = 'banner night';
      phaseBanner.textContent = `🌙 第 ${day} 夜 · 天黑請閉眼`;
      speak('天黑請閉眼。');
      setTimeout(renderNightStep, 700);
    }

    function renderNightStep() {
      setDots(nightSteps, nightIdx);
      renderBoard();
      if (nightIdx >= nightSteps.length) return endNight();
      const step = nightSteps[nightIdx];
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });

      if (step.key === 'cupid') {
        c.appendChild(el('h2', { text: '💘 邱比特行動' }));
        c.appendChild(el('p', { class: 'muted', text: '邱比特請睜眼，指定兩名玩家成為戀人（任一人死亡，另一人會殉情）。' }));
        speak('邱比特請睜眼，請指定兩名戀人。');
        const picker = multiSeatPicker(2, () => true);
        c.appendChild(picker);
        c.appendChild(btn('確認戀人 →', '', () => {
          const sel = picker.get();
          if (sel.length !== 2) return toast('請選擇兩名戀人。', true);
          const r = game.actCupid(sel[0], sel[1]);
          if (!r.ok) return toast(r.error, true);
          toast(`戀人：${sel[0]}號 ❤ ${sel[1]}號`);
          nextStep();
        }));

      } else if (step.key === 'guard') {
        c.appendChild(el('h2', { text: '🛡️ 守衛行動' }));
        c.appendChild(el('p', { class: 'muted', text: '守衛請睜眼，選擇守護對象（不能連守同一人，可空守）。' }));
        speak('守衛請睜眼，請選擇要守護的玩家。');
        const guard = game.playersByRole('guard')[0];
        pickerRef = seatPicker({
          allowNull: true, nullLabel: '空守（不守任何人）',
          onPick: () => {}
        });
        c.appendChild(pickerRef);
        c.appendChild(btn('確認守衛行動 →', '', () => {
          const r = game.actGuard(pickerRef.getSelected());
          if (!r.ok) return toast(r.error, true);
          nextStep();
        }));

      } else if (step.key === 'wolf') {
        c.appendChild(el('h2', { text: '🐺 狼人行動' }));
        const wolves = game.players.filter((p) => isWolf(p.roleId)).map((p) => `${p.seat}號${p.alive ? '' : '(已出局)'}`).join('、');
        c.appendChild(el('p', { class: 'muted', html: `狼人請睜眼。狼隊：<b>${wolves}</b>。請選擇今晚要擊殺的玩家。` }));
        speak('狼人請睜眼，請選擇要擊殺的玩家。');
        pickerRef = seatPicker({ allowNull: true, nullLabel: '空刀（不殺人）', onPick: () => {} });
        c.appendChild(pickerRef);
        c.appendChild(btn('確認擊殺目標 →', '', () => {
          const r = game.actWolf(pickerRef.getSelected());
          if (!r.ok) return toast(r.error, true);
          nextStep();
        }));

      } else if (step.key === 'witch') {
        c.appendChild(el('h2', { text: '🧪 女巫行動' }));
        const killed = game.night.wolfTarget;
        const info = killed != null ? `今晚 <b>${killed}號</b> 被狼人擊殺。` : '今晚無人被狼人擊殺。';
        c.appendChild(el('p', { class: 'muted', html: `女巫請睜眼。${info}` }));
        speak('女巫請睜眼。' + (killed != null ? `今晚${killed}號被擊殺，是否使用解藥？` : '今晚平安，請決定是否使用毒藥。'));

        let saveChosen = false, poisonTarget = null;
        // 解藥
        if (game.witch.antidote && killed != null) {
          const saveBtn = btn('💊 使用解藥救 ' + killed + '號', 'good', () => {
            const r = game.actWitchSave();
            if (!r.ok) { return toast(r.error, true); } // 防呆：第一晚自救等
            saveChosen = true;
            saveBtn.textContent = '✓ 已使用解藥';
            saveBtn.disabled = true;
            toast('已使用解藥救 ' + killed + '號');
          });
          c.appendChild(saveBtn);
        } else if (!game.witch.antidote) {
          c.appendChild(el('p', { class: 'muted small', text: '解藥已用完。' }));
        }
        // 毒藥
        if (game.witch.poison) {
          c.appendChild(el('label', { text: '☠️ 使用毒藥（選擇對象，可不用）' }));
          const pp = seatPicker({ allowNull: true, nullLabel: '不使用毒藥', filter: (p) => game.playersByRole('witch').every((w) => w.seat !== p.seat), onPick: (s) => { poisonTarget = s; } });
          c.appendChild(pp);
        } else {
          c.appendChild(el('p', { class: 'muted small', text: '毒藥已用完。' }));
        }
        c.appendChild(btn('確認女巫行動 →', '', () => {
          if (poisonTarget != null) {
            const r = game.actWitchPoison(poisonTarget);
            if (!r.ok) return toast(r.error, true);
          }
          nextStep();
        }));

      } else if (step.key === 'seer') {
        c.appendChild(el('h2', { text: '🔮 預言家行動' }));
        c.appendChild(el('p', { class: 'muted', text: '預言家請睜眼，選擇要查驗的玩家。' }));
        speak('預言家請睜眼，請選擇要查驗的玩家。');
        const resultBox = el('div', { class: 'banner', style: 'display:none' });
        pickerRef = seatPicker({
          filter: (p) => game.playersByRole('seer').every((s) => s.seat !== p.seat),
          onPick: (s) => {
            const r = game.actSeer(s);
            if (!r.ok) return toast(r.error, true);
            resultBox.style.display = 'block';
            resultBox.className = 'banner ' + (r.result === 'wolf' ? 'wolf-win' : 'good-win');
            resultBox.textContent = `查驗結果：${s}號 是 ${r.result === 'wolf' ? '🐺 狼人' : '✅ 好人'}`;
          }
        });
        c.appendChild(pickerRef);
        c.appendChild(resultBox);
        c.appendChild(btn('完成查驗 →', '', () => {
          if (game.night.seerTarget == null) return toast('請先選擇查驗對象。', true);
          nextStep();
        }));
      }
      panel.appendChild(c);
    }

    function nextStep() { nightIdx++; setTimeout(renderNightStep, 200); }

    function endNight() {
      const { deaths } = game.resolveNight();
      phaseBanner.className = 'banner day';
      phaseBanner.textContent = '☀️ 天亮了';
      renderBoard();
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('h2', { text: '☀️ 天亮了' }));
      if (deaths.length === 0) {
        c.appendChild(el('div', { class: 'banner good-win', text: '昨晚是平安夜，沒有人死亡。' }));
        speak('天亮了。昨晚是平安夜，沒有人死亡。');
      } else {
        const names = deaths.map((d) => `${d.seat}號`).join('、');
        c.appendChild(el('div', { class: 'banner wolf-win', text: `昨晚死亡：${names}` }));
        speak(`天亮了。昨晚死亡的是 ${deaths.map((d) => d.seat + '號').join('、')}。`);
      }
      panel.appendChild(c);
      handleGunThen(() => {
        if (checkOver()) return;
        c.appendChild(btn('進入白天討論 →', '', startDiscuss));
      });
    }

    // 處理待開槍（獵人/狼王）
    function handleGunThen(done) {
      const pg = game.pendingGun;
      if (!pg) { done(); return; }
      const p = game.getPlayer(pg.seat);
      const c = el('div', { class: 'card' });
      c.appendChild(el('h2', { text: (pg.roleId === 'wolfking' ? '👑 狼王開槍' : '🔫 獵人開槍') }));
      c.appendChild(el('p', { class: 'muted', html: `<b>${pg.seat}號</b>（${ROLES[pg.roleId].name}）出局，可開槍帶走一人。` }));
      speak(`${pg.seat}號${ROLES[pg.roleId].name}出局，是否開槍？`);
      const picker = seatPicker({ allowNull: true, nullLabel: '不開槍', filter: (x) => x.seat !== pg.seat });
      c.appendChild(picker);
      c.appendChild(btn('確認', 'danger', () => {
        const r = game.shoot(pg.seat, picker.getSelected());
        if (!r.ok) return toast(r.error, true);
        renderBoard();
        c.remove();
        if (r.target) toast(`${pg.seat}號 開槍帶走 ${r.target}號`);
        announceLovers(r.loverDead);
        handleGunThen(done); // 連鎖開槍
      }));
      panel.appendChild(c);
    }

    // 戀人殉情提示
    function announceLovers(loverDead) {
      if (loverDead && loverDead.length) {
        const txt = loverDead.map((s) => `${s}號`).join('、') + ' 殉情身亡';
        toast('💔 ' + txt);
        speak(txt + '。');
        renderBoard();
      }
    }

    function checkOver() {
      const w = game.checkWin();
      if (w.over) { showGameOver(w.winner); return true; }
      return false;
    }

    function startDiscuss() {
      game.startDiscuss();
      phaseBanner.className = 'banner day';
      phaseBanner.textContent = `☀️ 第 ${game.day} 天 · 自由發言`;
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('h2', { text: '💬 發言討論' }));
      c.appendChild(el('p', { class: 'muted', text: '請存活玩家依序發言。法官可控制計時，完成後進入投票。' }));
      c.appendChild(timerWidget());
      // 白天主動技能（騎士決鬥、白狼王自爆）
      appendDayAbilities(c);
      c.appendChild(btn('🗳️ 進入投票', '', startVote));
      panel.appendChild(c);
      renderBoard();
    }

    // 在白天面板加入主動技能按鈕
    function appendDayAbilities(container) {
      const knights = game.playersByRole('knight');
      const wwks = game.playersByRole('whitewolfking');
      if (!knights.length && !wwks.length) return;
      container.appendChild(el('label', { text: '白天主動技能（玩家宣告時才使用）' }));
      for (const k of knights) {
        container.appendChild(btn(`⚔️ 騎士決鬥（${k.seat}號）`, 'secondary', () => doKnightDuel(k.seat)));
      }
      for (const w of wwks) {
        container.appendChild(btn(`🐉 白狼王自爆（${w.seat}號）`, 'danger', () => doSelfDestruct(w.seat)));
      }
    }

    function doKnightDuel(knightSeat) {
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('h2', { text: `⚔️ 騎士決鬥（${knightSeat}號）` }));
      c.appendChild(el('p', { class: 'muted', text: '選擇要決鬥的對象。對方是狼→對方死、直接天黑；對方是好人→騎士陣亡。' }));
      const picker = seatPicker({ filter: (x) => x.seat !== knightSeat });
      c.appendChild(picker);
      c.appendChild(btn('確認決鬥', 'danger', () => {
        const t = picker.getSelected();
        if (t == null) return toast('請選擇決鬥對象。', true);
        const r = game.knightDuel(knightSeat, t);
        if (!r.ok) return toast(r.error, true);
        renderBoard();
        if (r.targetIsWolf) {
          speak(`${t}號是狼人，決鬥成功，直接進入黑夜。`);
          panel.innerHTML = '';
          const cc = el('div', { class: 'card' });
          cc.appendChild(el('div', { class: 'banner wolf-win', text: `⚔️ ${t}號 是狼人，決鬥成功被處決！` }));
          panel.appendChild(cc);
          announceLovers(r.loverDead);
          handleGunThen(() => { if (checkOver()) return; cc.appendChild(btn('🌙 直接進入黑夜', '', beginNight)); });
        } else {
          speak(`${t}號是好人，騎士陣亡。`);
          panel.innerHTML = '';
          const cc = el('div', { class: 'card' });
          cc.appendChild(el('div', { class: 'banner', text: `⚔️ ${t}號 是好人，騎士 ${knightSeat}號 陣亡。遊戲繼續。` }));
          panel.appendChild(cc);
          announceLovers(r.loverDead);
          if (checkOver()) return;
          cc.appendChild(btn('回到發言討論', '', startDiscuss));
        }
      }));
      c.appendChild(btn('取消', 'ghost', startDiscuss));
      panel.appendChild(c);
    }

    function doSelfDestruct(seat) {
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('h2', { text: `🐉 白狼王自爆（${seat}號）` }));
      c.appendChild(el('p', { class: 'muted', text: '可帶走一名玩家，或不帶人。自爆後直接進入黑夜。' }));
      const picker = seatPicker({ allowNull: true, nullLabel: '不帶走任何人', filter: (x) => x.seat !== seat });
      c.appendChild(picker);
      c.appendChild(btn('確認自爆', 'danger', () => {
        const r = game.selfDestruct(seat, picker.getSelected());
        if (!r.ok) return toast(r.error, true);
        renderBoard();
        speak(`白狼王 ${seat}號 自爆${r.took ? '，帶走 ' + r.took + '號' : ''}，直接進入黑夜。`);
        panel.innerHTML = '';
        const cc = el('div', { class: 'card' });
        cc.appendChild(el('div', { class: 'banner wolf-win', text: `🐉 白狼王 ${seat}號 自爆${r.took ? '，帶走 ' + r.took + '號' : ''}！` }));
        panel.appendChild(cc);
        announceLovers(r.loverDead);
        handleGunThen(() => { if (checkOver()) return; cc.appendChild(btn('🌙 直接進入黑夜', '', beginNight)); });
      }));
      c.appendChild(btn('取消', 'ghost', startDiscuss));
      panel.appendChild(c);
    }

    function timerWidget() {
      const box = el('div', { class: 'card', style: 'background:var(--bg2)' });
      let sec = 60, timer = null;
      const disp = el('div', { class: 'val', style: 'font-size:32px;text-align:center' , text: '60 秒'});
      const row = el('div', { class: 'row' });
      const startB = btn('開始計時', 'sm secondary', () => {
        clearInterval(timer); sec = 60; disp.textContent = sec + ' 秒';
        timer = setInterval(() => { sec--; disp.textContent = sec + ' 秒'; if (sec <= 0) { clearInterval(timer); speak('時間到。'); disp.textContent = '時間到'; } }, 1000);
      });
      const stopB = btn('停止', 'sm ghost', () => clearInterval(timer));
      row.append(startB, stopB);
      box.append(disp, row);
      return box;
    }

    function startVote() {
      game.startVote();
      phaseBanner.className = 'banner day';
      phaseBanner.textContent = `🗳️ 第 ${game.day} 天 · 投票`;
      speak('請開始投票。');
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('h2', { text: '🗳️ 投票出局' }));
      c.appendChild(el('p', { class: 'muted', text: '請選擇票數最高（被投出）的玩家，或選擇平票無人出局。' }));
      const picker = seatPicker({ allowNull: true, nullLabel: '平票 / 無人出局' });
      c.appendChild(picker);
      c.appendChild(btn('確認出局結果 →', 'danger', () => {
        const r = game.execute(picker.getSelected());
        if (!r.ok) return toast(r.error, true);
        renderBoard();
        panel.innerHTML = '';
        const cc = el('div', { class: 'card' });
        if (r.executed == null) {
          cc.appendChild(el('div', { class: 'banner', text: '本輪無人出局。' }));
          speak('本輪無人出局。');
        } else if (r.idiot) {
          cc.appendChild(el('div', { class: 'banner day', text: `${r.executed}號 是白痴！翻牌亮明身份，不死亡但失去投票權。` }));
          speak(`${r.executed}號是白痴，翻牌不死，但失去投票權。`);
        } else {
          cc.appendChild(el('div', { class: 'banner wolf-win', text: `${r.executed}號 被投票出局。` }));
          speak(`${r.executed}號被投票出局。`);
        }
        panel.appendChild(cc);
        announceLovers(r.loverDead);
        handleGunThen(() => {
          if (checkOver()) return;
          cc.appendChild(btn('🌙 進入下一夜', '', beginNight));
        });
      }));
      panel.appendChild(c);
    }

    function showGameOver(winner) {
      const lover = winner === 'lovers';
      phaseBanner.className = 'banner ' + (winner === 'wolf' ? 'wolf-win' : 'good-win');
      phaseBanner.textContent = lover ? '💘 戀人陣營勝利！' : (winner === 'wolf' ? '🐺 狼人陣營勝利！' : '✅ 好人陣營勝利！');
      speak(lover ? '遊戲結束，戀人陣營勝利。' : (winner === 'wolf' ? '遊戲結束，狼人陣營勝利。' : '遊戲結束，好人陣營勝利。'));
      panel.innerHTML = '';
      const c = el('div', { class: 'card' });
      c.appendChild(el('h2', { text: '🎉 遊戲結束' }));
      c.appendChild(el('div', { class: 'roleMap', html: game.players.map((p) => {
        const r = ROLES[p.roleId];
        return `<span class="pill" style="margin:3px">${p.seat}號 ${r.emoji}${r.name}</span>`;
      }).join(' ') }));
      c.appendChild(el('div', { class: 'spacer' }));
      c.appendChild(btn('🔄 再玩一局（相同設定）', '', () => location.reload()));
      c.appendChild(btn('⚙️ 回首頁重新設定', 'secondary', () => location.href = 'index.html'));
      panel.appendChild(c);
      renderBoard();
    }

    startGame();
  </script>
</body>
</html>
