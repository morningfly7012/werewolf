name: Deploy to GitHub Pages

# 將 public/ 內的靜態網頁部署到 GitHub Pages。
# 法官模式可完整運作；遊玩模式需另接 Node 後端（見 README）。

on:
  push:
    branches:
      - main
      - claude/werewolf-game-webapp-fEpYO
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # 若儲存庫尚未啟用 Pages，嘗試自動啟用（需 pages: write 權限）
          enablement: true

      - name: Upload static site (public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
